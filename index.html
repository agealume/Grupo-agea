<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ALUNA - Demo MVP</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #f5f5f5;
            --accent-gold: #D4AF37;
            --accent-gold-dark: #aa8c2c;
            --correct: #28a745;
            --wrong: #dc3545;
            --surface: #111111;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            touch-action: manipulation; /* Remove o delay de 300ms no mobile */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Limite mobile-first */
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Telas */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            padding: 20px;
            background-color: var(--bg-color);
            z-index: 10;
        }

        .screen.active {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Tipografia e Botões */
        h1, h2 { text-transform: uppercase; letter-spacing: 1px; }
        .title { color: var(--accent-gold); font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
        .subtitle { font-size: 1rem; text-align: center; color: #888; margin-bottom: 40px; }

        .btn-primary {
            background-color: var(--accent-gold);
            color: #000;
            border: none;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: transform 0.1s, background-color 0.2s;
            text-transform: uppercase;
        }

        .btn-primary:active { transform: scale(0.98); background-color: var(--accent-gold-dark); }

        /* Jogo */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .score-board { font-size: 1.2rem; color: var(--accent-gold); font-weight: bold; }
        .room-info { font-size: 0.9rem; color: #888; }

        .timer-container { width: 100%; height: 6px; background-color: #333; border-radius: 3px; margin-bottom: 20px; overflow: hidden; }
        .timer-bar { height: 100%; width: 100%; background-color: var(--accent-gold); transition: width 0.1s linear; }
        
        .timer-warning { background-color: var(--wrong) !important; }

        .question-box { background-color: var(--surface); padding: 20px; border-radius: 10px; margin-bottom: 20px; flex-grow: 1; display: flex; align-items: center; justify-content: center; border-left: 4px solid var(--accent-gold); }
        .question-text { font-size: 1.3rem; text-align: center; font-weight: 500; }

        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
        
        .option-btn {
            background-color: var(--surface);
            color: var(--text-color);
            border: 1px solid #333;
            padding: 16px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .option-btn:disabled { opacity: 0.8; cursor: not-allowed; }
        .option-btn.correct { background-color: var(--correct); border-color: var(--correct); color: #fff; }
        .option-btn.wrong { background-color: var(--wrong); border-color: var(--wrong); color: #fff; }

        /* Simulação de Sala / Ranking */
        .live-feed {
            height: 60px;
            overflow: hidden;
            font-size: 0.85rem;
            color: #666;
            margin-top: auto;
            border-top: 1px dashed #333;
            padding-top: 10px;
        }

        .feed-item { margin-bottom: 4px; animation: slideUp 0.3s ease-out; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Resultados */
        .ranking-list { width: 100%; margin: 20px 0; background-color: var(--surface); border-radius: 10px; overflow: hidden; }
        .ranking-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; }
        .ranking-item:last-child { border-bottom: none; }
        .ranking-item.is-me { background-color: rgba(212, 175, 55, 0.1); border-left: 3px solid var(--accent-gold); }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 30px; width: 100%; }
        .stat-box { background-color: var(--surface); padding: 15px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.5rem; color: var(--accent-gold); font-weight: bold; }
        .stat-lbl { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        .center-content { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="start-screen" class="screen active">
        <div class="center-content">
            <h1 class="title">ALUNA</h1>
            <p class="subtitle">Sala Competitiva Alfa<br><span style="color:var(--accent-gold);font-size:0.8rem;">12 Jogadores Ativos</span></p>
            <button class="btn-primary" onclick="startGame()">Entrar no Jogo</button>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="header">
            <div class="room-info">Sala #027</div>
            <div class="score-board">PTS: <span id="score-display">0</span></div>
        </div>
        
        <div class="timer-container">
            <div id="timer-bar" class="timer-bar"></div>
        </div>

        <div class="question-box">
            <div id="question-text" class="question-text">A carregar...</div>
        </div>

        <div id="options-container" class="options-grid">
            </div>

        <div id="live-feed" class="live-feed">
            </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="center-content" style="justify-content: flex-start; padding-top: 40px;">
            <h2 style="color:var(--accent-gold); margin-bottom: 20px;">Fim de Jogo</h2>
            
            <div class="stats-grid">
                <div class="stat-box">
                    <div class="stat-val" id="final-score">0</div>
                    <div class="stat-lbl">Pontos</div>
                </div>
                <div class="stat-box">
                    <div class="stat-val" id="final-accuracy">0%</div>
                    <div class="stat-lbl">Precisão</div>
                </div>
            </div>

            <div style="width: 100%; text-align: left; color: #888; font-size: 0.9rem;">Ranking da Sala:</div>
            <div class="ranking-list" id="ranking-container">
                </div>

            <button class="btn-primary" style="margin-top: auto;" onclick="resetGame()">Jogar Novamente</button>
        </div>
    </div>

</div>

<script>
    // --- DADOS (50% Angola / 50% Geral) ---
    // Estrutura modular para fácil expansão até 100
    const questionBank = [
        { q: "Qual é a capital de Angola?", opts: ["Luanda", "Benguela", "Huambo", "Lubango"], ans: 0 },
        { q: "Em que ano Angola tornou-se independente?", opts: ["1965", "1975", "1985", "1992"], ans: 1 },
        { q: "Quem pintou a 'Mona Lisa'?", opts: ["Van Gogh", "Picasso", "Da Vinci", "Rembrandt"], ans: 2 },
        { q: "Qual o maior oceano do planeta?", opts: ["Atlântico", "Índico", "Pacífico", "Ártico"], ans: 2 },
        { q: "Qual a moeda oficial de Angola?", opts: ["Dólar", "Metical", "Kwanza", "Real"], ans: 2 },
        { q: "Quem foi o primeiro Presidente de Angola?", opts: ["José Eduardo dos Santos", "Agostinho Neto", "Holden Roberto", "Jonas Savimbi"], ans: 1 },
        { q: "Qual é o planeta conhecido como o Planeta Vermelho?", opts: ["Vénus", "Júpiter", "Saturno", "Marte"], ans: 3 },
        { q: "Qual o maior rio exclusivamente angolano?", opts: ["Zaire", "Cunene", "Kwanza", "Cubango"], ans: 2 },
        { q: "Quem escreveu 'Dom Quixote'?", opts: ["Cervantes", "Camões", "Shakespeare", "Dante"], ans: 0 },
        { q: "Qual é o metal mais caro do mundo?", opts: ["Ouro", "Ródio", "Platina", "Prata"], ans: 1 }
    ];

    // --- ESTADO DO JOGO ---
    let currentQuestions = [];
    let currentQIndex = 0;
    let score = 0;
    let correctAnswersCount = 0;
    
    // Timer System
    const TIME_LIMIT_MS = 6000; // 6 Segundos
    let timeRemaining = TIME_LIMIT_MS;
    let timerInterval;
    let isQuestionActive = false;

    // Bot Engine (Ilusão de Multiplayer)
    const botNames = ["Sniper99", "AlphaWolf", "MestreK", "Tatica_L", "Investidor01"];
    let bots = botNames.map(name => ({ name, score: Math.floor(Math.random() * 500) }));

    // Elementos DOM
    const screens = {
        start: document.getElementById('start-screen'),
        game: document.getElementById('game-screen'),
        result: document.getElementById('result-screen')
    };

    // --- LÓGICA CORE ---

    function switchScreen(screenKey) {
        Object.values(screens).forEach(s => s.classList.remove('active'));
        screens[screenKey].classList.add('active');
    }

    function shuffleArray(array) {
        return array.sort(() => Math.random() - 0.5);
    }

    function startGame() {
        score = 0;
        correctAnswersCount = 0;
        currentQIndex = 0;
        document.getElementById('score-display').innerText = score;
        
        // Prepara 5 perguntas aleatórias para a ronda
        currentQuestions = shuffleArray([...questionBank]).slice(0, 5);
        
        // Simula bot scores iniciais
        bots.forEach(b => b.score = Math.floor(Math.random() * 300));
        
        switchScreen('game');
        loadQuestion();
    }

    function loadQuestion() {
        if (currentQIndex >= currentQuestions.length) {
            endGame();
            return;
        }

        isQuestionActive = true;
        const qData = currentQuestions[currentQIndex];
        
        document.getElementById('question-text').innerText = qData.q;
        const optsContainer = document.getElementById('options-container');
        optsContainer.innerHTML = '';

        qData.opts.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            // Usamos onpointerdown para máxima velocidade mobile (melhor que click e touchstart)
            btn.onpointerdown = () => handleAnswer(index, btn); 
            optsContainer.appendChild(btn);
        });

        startTimer();
        simulateBotActivity();
    }

    function startTimer() {
        timeRemaining = TIME_LIMIT_MS;
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none';
        bar.style.width = '100%';
        bar.classList.remove('timer-warning');
        
        // Força reflow
        void bar.offsetWidth;
        
        bar.style.transition = `width ${TIME_LIMIT_MS}ms linear`;
        bar.style.width = '0%';

        clearInterval(timerInterval);
        const startTime = Date.now();

        timerInterval = setInterval(() => {
            const elapsed = Date.now() - startTime;
            timeRemaining = TIME_LIMIT_MS - elapsed;

            if (timeRemaining <= 2000) {
                bar.classList.add('timer-warning');
            }

            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                if (isQuestionActive) handleAnswer(-1, null); // Timeout
            }
        }, 50);
    }

    function handleAnswer(selectedIndex, btnElement) {
        if (!isQuestionActive) return;
        isQuestionActive = false;
        clearInterval(timerInterval);
        document.getElementById('timer-bar').style.transition = 'none';

        const qData = currentQuestions[currentQIndex];
        const isCorrect = selectedIndex === qData.ans;
        
        // Bloqueia todos os botões
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if (selectedIndex !== -1 && btnElement) {
            if (isCorrect) {
                btnElement.classList.add('correct');
                const timeBonus = Math.floor((timeRemaining / TIME_LIMIT_MS) * 50);
                score += (100 + timeBonus); // Pontuação base + bonus de velocidade
                correctAnswersCount++;
                document.getElementById('score-display').innerText = score;
                addFeedMessage("Você acertou rapidamente!");
            } else {
                btnElement.classList.add('wrong');
                allBtns[qData.ans].classList.add('correct'); // Mostra a certa
                addFeedMessage("Resposta errada.");
            }
        } else {
            // Timeout
            allBtns[qData.ans].classList.add('correct');
            addFeedMessage("Tempo esgotado!");
        }

        // Avanca para proxima apos delay visual
        setTimeout(() => {
            currentQIndex++;
            loadQuestion();
        }, 1200);
    }

    // --- SISTEMA DE BOTS ---
    
    function simulateBotActivity() {
        if(Math.random() > 0.5) {
            const randomBot = bots[Math.floor(Math.random() * bots.length)];
            randomBot.score += (Math.random() > 0.3) ? 100 : 0; // Bots ganham pontos aleatoriamente
            
            const actions = ["respondeu rápido", "fez uma aposta alta", "está na sequência"];
            addFeedMessage(`${randomBot.name} ${actions[Math.floor(Math.random() * actions.length)]}`);
        }
    }

    function addFeedMessage(msg) {
        const feed = document.getElementById('live-feed');
        const div = document.createElement('div');
        div.className = 'feed-item';
        div.innerText = `> ${msg}`;
        feed.prepend(div);
        if (feed.children.length > 3) feed.lastChild.remove();
    }

    // --- RESULTADOS ---

    function endGame() {
        clearInterval(timerInterval);
        
        document.getElementById('final-score').innerText = score;
        const accuracy = Math.round((correctAnswersCount / currentQuestions.length) * 100);
        document.getElementById('final-accuracy').innerText = `${accuracy}%`;

        // Gera Ranking Misturando User e Bots
        const allPlayers = [...bots, { name: "TU (Exmo)", score: score, isMe: true }];
        allPlayers.sort((a, b) => b.score - a.score);

        const rankContainer = document.getElementById('ranking-container');
        rankContainer.innerHTML = '';

        allPlayers.slice(0, 4).forEach((p, index) => {
            const div = document.createElement('div');
            div.className = `ranking-item ${p.isMe ? 'is-me' : ''}`;
            div.innerHTML = `<span>#${index + 1} ${p.name}</span> <span style="color:var(--accent-gold); font-weight:bold;">${p.score} pts</span>`;
            rankContainer.appendChild(div);
        });

        // Grava no LocalStorage (persistência básica exigida)
        localStorage.setItem('aluna_last_score', score);

        switchScreen('result');
    }

    function resetGame() {
        document.getElementById('live-feed').innerHTML = '';
        startGame();
    }

    // Inicialização de segurança para evitar bugs de zoom em double-tap iOS
    document.addEventListener('dblclick', function(event) {
        event.preventDefault();
    }, { passive: false });
</script>

</body>
</html>
